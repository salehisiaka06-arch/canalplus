<div class="container">
    <h2>Formulaire de Commande</h2>

   <form onsubmit="return traiterCommande()">
    <input type="text" id="nom" placeholder="Votre nom" required>
    <input type="tel" id="telephone" placeholder="Téléphone" required>

    <select id="offre" required>
        <option value="">Choisir une offre</option>
        <option value="10">Canal+ Access - 10$</option>
        <option value="20">Canal+ Evasion - 20$</option>
        <option value="35">Canal+ Tout Canal - 35$</option>
    </select>

    <select id="paiement" required>
        <option value="">Mode de paiement</option>
        <option>Orange money</option>
        <option>M-pesa</option>
        <option>Airtel money</option>
        <option>Carte Bancaire</option>
    </select>

    <input type="submit" value="Payer Maintenant" class="btn">
</form>
